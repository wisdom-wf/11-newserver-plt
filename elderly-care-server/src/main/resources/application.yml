server:
  port: 8080

spring:
  application:
    name: elderly-care-server
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/elderly_care?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&connectionCollation=utf8mb4_unicode_ci
    username: root
    password: root
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.elderlycare.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置
jwt:
  secret: ElderlyCareSecretKey2026ForJWTTokenGeneration
  expiration: 7200000

# 分页配置
page:
  default-page-size: 10
  max-page-size: 100

# 腾讯电子签配置
tencent:
  ess:
    secret-id: ${TENCENT_ESS_SECRET_ID}
    secret-key: ${TENCENT_ESS_SECRET_KEY}
    agent-id: ${TENCENT_ESS_AGENT_ID:yD3h9UU1axunqxUumZK21EeQkEj8LQ4v}
    region: ap-guangzhou
    callback-url: https://wisdomdance.cn/jxy/api/contracts/callback
    callback-token: 0AEB8A76DD374FA1A85137D56B499844
    callback-encryption-key: E8446D4606BE49348E2B4E5F009DDC09
    default-expire-days: 7
    template-id: ${TENCENT_ESS_TEMPLATE_ID:yD3h9UU1a9h5ddUuqu5e4S1XqK3dlK6u}
    operator-id: ${TENCENT_ESS_OPERATOR_ID:yD3h9UU1axunqxUumZK21EeQkEj8LQ4v}

# 合同企业信息配置（以后可改为从服务商表动态获取）
contract:
  enterprise:
    name: "延安家享悠网络科技有限公司"
    credit-code: "91610113MA7JQXXX00"
    legal-person: "王凡"
    address: "陕西省西安市"
    phone: "13800138000"
    seal-id: "yD3hWUU1lcdbupUuFEBodyMoYCNABTCm"
    ess-open-id: "yD3hWUU1l669avUhwB3xWL8C12PcHjRR"

# 阿里云百炼AI配置
aliyun:
