<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>丁峰养老 - 平台功能介绍系列视频</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Noto Sans CJK SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #5D4E37;
    overflow: hidden;
    width: 1920px;
    height: 1080px;
  }

  .scene {
    position: absolute;
    top: 0;
    left: 0;
    width: 1920px;
    height: 1080px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 40px;
    padding: 80px;
  }

  h1 { font-size: 120px; color: #F5A623; font-weight: 700; text-align: center; }
  h2 { font-size: 72px; color: #FFF8E7; font-weight: 600; text-align: center; }
  h3 { font-size: 48px; color: #F5A623; font-weight: 500; text-align: center; }
  p { font-size: 48px; color: #7A6B5A; }

  .warm-bg {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #5D4E37 0%, #3D3426 50%, #5D4E37 100%);
    z-index: -1;
  }

  .brand-watermark {
    position: absolute;
    top: 80px;
    right: 80px;
    font-size: 28px;
    color: #F5A623;
    opacity: 0.6;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 50;
  }

  .episode-number {
    font-size: 280px;
    color: #F5A623;
    opacity: 0.15;
    font-weight: 900;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 1;
  }

  .intro-text {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .episode-label {
    font-size: 36px;
    color: #F5A623;
    letter-spacing: 8px;
    font-weight: 500;
  }

  .episode-title {
    font-size: 96px;
    color: #FFF8E7;
    font-weight: 700;
  }
</style>
</head>
<body>

<!-- Root Composition -->
<div id="root" data-composition-id="episode-intro" data-width="1920" data-height="1080" data-start="0" data-duration="1.5">

  <!-- 品牌水印 -->
  <div class="brand-watermark" id="watermark">🏠 丁峰养老</div>

  <!-- Scene -->
  <div id="scene" class="scene"></div>

</div>

<script type="module">
import { gsap } from 'https://cdn.jsdelivr.net/npm/gsap@3.12.5/index.js';

const root = document.getElementById('root');
const duration = parseFloat(root.dataset.duration);

// 暴露 __hf 对象
window.__hf = { duration, seek: () => {} };

// 从 URL 参数获取章节信息
const params = new URLSearchParams(window.location.search);
const episodeNum = params.get('ep') || '01';
const episodeLabel = params.get('label') || '平台功能介绍系列视频 001';
const episodeTitle = params.get('title') || '服务商入驻管理';

const scene = document.getElementById('scene');
scene.style.background = 'linear-gradient(135deg, #5D4E37 0%, #3D3426 50%, #5D4E37 100%)';
scene.innerHTML = `
  <span class="episode-number">${episodeNum}</span>
  <div class="intro-text">
    <span class="episode-label">${episodeLabel}</span>
    <h1 class="episode-title">${episodeTitle}</h1>
  </div>
`;

// 水印淡入
gsap.fromTo('#watermark', { opacity: 0 }, { opacity: 0.6, duration: 0.3, ease: 'power2.out', delay: 0.1 });

// 内容动画
gsap.fromTo('.episode-number', { opacity: 0, scale: 0.8 }, { opacity: 0.15, scale: 1, duration: 0.4, ease: 'power3.out', delay: 0.2 });
gsap.fromTo('.intro-text', { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 0.4, ease: 'power3.out', delay: 0.3 });

// 最终淡出
gsap.to(root, { opacity: 0, duration: 0.3, ease: 'power2.in', delay: 1.2 });
</script>
</body>
</html>
