<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>丁峰养老 - 平台功能介绍系列视频</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Noto Sans CJK SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #5D4E37;
    overflow: hidden;
    width: 1920px;
    height: 1080px;
  }

  .scene {
    position: absolute;
    top: 0;
    left: 0;
    width: 1920px;
    height: 1080px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 40px;
    padding: 80px;
  }

  h1 { font-size: 120px; color: #F5A623; font-weight: 700; text-align: center; }
  h2 { font-size: 72px; color: #FFF8E7; font-weight: 600; text-align: center; }
  h3 { font-size: 48px; color: #F5A623; font-weight: 500; text-align: center; }
  p { font-size: 48px; color: #7A6B5A; }

  .warm-bg {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #5D4E37 0%, #3D3426 50%, #5D4E37 100%);
    z-index: -1;
  }

  /* 品牌水印 */
  .brand-watermark {
    position: absolute;
    top: 80px;
    right: 80px;
    font-size: 28px;
    color: #F5A623;
    opacity: 0.6;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 50;
  }

  .episode-number {
    font-size: 280px;
    color: #F5A623;
    opacity: 0.15;
    font-weight: 900;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 1;
  }

  .intro-text {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .episode-label {
    font-size: 36px;
    color: #F5A623;
    letter-spacing: 8px;
    font-weight: 500;
  }

  .episode-title {
    font-size: 96px;
    color: #FFF8E7;
    font-weight: 700;
  }

  .episode-theme {
    font-size: 48px;
    color: #F5A623;
    margin-top: 20px;
  }
</style>
</head>
<body>

<!-- Root Composition -->
<div id="root" data-composition-id="video-series-intro" data-width="1920" data-height="1080" data-start="0" data-duration="6">

  <!-- 品牌水印 -->
  <div class="brand-watermark" id="watermark">🏠 丁峰养老</div>

  <!-- Intro 1: 服务商入驻管理 -->
  <div id="scene1" class="scene"></div>

  <!-- Intro 2: 服务人员管理 -->
  <div id="scene2" class="scene"></div>

  <!-- Intro 3: 服务质检管理 -->
  <div id="scene3" class="scene"></div>

  <!-- Intro 4: 满意度调查 -->
  <div id="scene4" class="scene"></div>

</div>

<script type="module">
import { gsap } from 'https://cdn.jsdelivr.net/npm/gsap@3.12.5/index.js';

const root = document.getElementById('root');
const duration = parseFloat(root.dataset.duration);

// 暴露 __hf 对象供 HyperFrames 使用
window.__hf = { duration, seek: () => {} };

// 场景配置
const sceneConfig = [
  { id: 'scene1', label: '平台功能介绍系列视频 001', title: '服务商入驻管理', start: 0 },
  { id: 'scene2', label: '平台功能介绍系列视频 002', title: '服务人员管理', start: 1.5 },
  { id: 'scene3', label: '平台功能介绍系列视频 003', title: '服务质检管理', start: 3.0 },
  { id: 'scene4', label: '平台功能介绍系列视频 004', title: '满意度调查', start: 4.5 }
];

sceneConfig.forEach((scene) => {
  const el = document.getElementById(scene.id);
  el.style.background = 'linear-gradient(135deg, #5D4E37 0%, #3D3426 50%, #5D4E37 100%)';

  // 创建场景内容
  el.innerHTML = `
    <span class="episode-number">${scene.id.replace('scene', '').padStart(2, '0')}</span>
    <div class="intro-text">
      <span class="episode-label">${scene.label}</span>
      <h1 class="episode-title">${scene.title}</h1>
    </div>
  `;
});

// 设置场景切换
sceneConfig.forEach((scene, index) => {
  const el = document.getElementById(scene.id);
  const nextEl = sceneConfig[index + 1] ? document.getElementById(sceneConfig[index + 1].id) : null;

  // 初始化状态
  if (index > 0) {
    gsap.set(el, { opacity: 0, visibility: 'hidden' });
  }

  // 入场动画
  gsap.to(el, {
    opacity: 1,
    visibility: 'visible',
    duration: 0.3,
    ease: 'power3.out',
    delay: scene.start
  });

  // 内容动画
  const introText = el.querySelector('.intro-text');
  const episodeNumber = el.querySelector('.episode-number');

  gsap.fromTo(episodeNumber,
    { opacity: 0, scale: 0.8 },
    { opacity: 0.15, scale: 1, duration: 0.5, ease: 'power3.out', delay: scene.start + 0.2 }
  );

  gsap.fromTo(introText,
    { opacity: 0, y: 30 },
    { opacity: 1, y: 0, duration: 0.4, ease: 'power3.out', delay: scene.start + 0.3 }
  );

  // 淡出 (在结束前0.3秒)
  gsap.to(el, {
    opacity: 0,
    duration: 0.3,
    ease: 'power2.in',
    delay: scene.start + 1.2
  });
});

// 最终淡出
gsap.to(root, {
  opacity: 0,
  duration: 0.5,
  delay: 5.7,
  ease: 'power2.in',
  onComplete: () => {
    document.body.style.opacity = 0;
  }
});
</script>
</body>
</html>
